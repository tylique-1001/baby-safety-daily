name: 🛡️ 推送看门狗 · 自愈

on:
  schedule:
    # 每小时整点扫描 (UTC)
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'cloud_push/**'
      - '.github/workflows/**'

permissions:
  contents: read
  actions: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: 🔍 检查报告是否存在
        id: check
        run: |
          TODAY=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          BJ_HOUR=$(TZ=Asia/Shanghai date +%H)
          BJ_MIN=$(TZ=Asia/Shanghai date +%M)

          echo "📅 北京时间: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
          echo "today=${TODAY}" >> $GITHUB_OUTPUT
          echo "bj_hour=${BJ_HOUR}" >> $GITHUB_OUTPUT
          echo "bj_min=${BJ_MIN}" >> $GITHUB_OUTPUT

          # --- 早间报告检查 (10:00-17:59) ---
          if [ "$BJ_HOUR" -ge 10 ] && [ "$BJ_HOUR" -lt 18 ]; then
            MORNING_FILE="docs/${TODAY}-婴儿安全日报.html"
            MORNING_URL="https://raw.githubusercontent.com/tylique-1001/baby-safety-daily/main/${MORNING_FILE}"
            HTTP=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$MORNING_URL" 2>/dev/null || echo "000")
            if [ "$HTTP" != "200" ]; then
              echo "❌ 早间报告缺失 (HTTP ${HTTP}) → 触发重新生成"
              echo "trigger_morning=true" >> $GITHUB_OUTPUT
            else
              echo "✅ 早间报告已存在 (HTTP ${HTTP})"
              echo "trigger_morning=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "⏭️  不在早间检查窗口 (10-17h), 跳过"
            echo "trigger_morning=false" >> $GITHUB_OUTPUT
          fi

          # --- 晚间报告检查 (19:00-23:59) ---
          if [ "$BJ_HOUR" -ge 19 ]; then
            EVENING_FILE="docs/${TODAY}-婴儿安全日报-晚间更新.html"
            EVENING_URL="https://raw.githubusercontent.com/tylique-1001/baby-safety-daily/main/${EVENING_FILE}"
            HTTP=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$EVENING_URL" 2>/dev/null || echo "000")
            if [ "$HTTP" != "200" ]; then
              echo "❌ 晚间报告缺失 (HTTP ${HTTP}) → 触发重新生成"
              echo "trigger_evening=true" >> $GITHUB_OUTPUT
            else
              echo "✅ 晚间报告已存在 (HTTP ${HTTP})"
              echo "trigger_evening=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "⏭️  不在晚间检查窗口 (19-23h), 跳过"
            echo "trigger_evening=false" >> $GITHUB_OUTPUT
          fi

      # 🚑 通道1: gh CLI 触发早间补推
      - name: 🚑 触发早间补推 (gh CLI)
        id: trigger_morning_gh
        if: steps.check.outputs.trigger_morning == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "🚑 触发早间补推 (gh CLI)..."
          if gh workflow run daily-morning.yml --ref main -f force=true 2>&1; then
            echo "✅ gh CLI 触发成功"
            echo "gh_ok=true" >> $GITHUB_OUTPUT
          else
            echo "❌ gh CLI 触发失败"
            echo "gh_ok=false" >> $GITHUB_OUTPUT
          fi

      # 🆘 通道2: curl API 直调（gh CLI 失败时的兜底）
      - name: 🆘 触发早间补推 (curl API兜底)
        if: steps.check.outputs.trigger_morning == 'true' && steps.trigger_morning_gh.outputs.gh_ok != 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "🆘 gh CLI 失败，使用 curl API 直调..."
          REPO="${{ github.repository }}"
          HTTP=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${PAT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/workflows/daily-morning.yml/dispatches" \
            -d '{"ref":"main","inputs":{"force":"true"}}')
          if [ "$HTTP" = "204" ]; then
            echo "✅ curl API 触发成功 (HTTP ${HTTP})"
          else
            echo "❌ curl API 也失败了 (HTTP ${HTTP})"
          fi

      # 🚑 通道1: gh CLI 触发晚间补推
      - name: 🚑 触发晚间补推 (gh CLI)
        id: trigger_evening_gh
        if: steps.check.outputs.trigger_evening == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "🚑 触发晚间补推 (gh CLI)..."
          if gh workflow run daily-evening.yml --ref main -f force=true 2>&1; then
            echo "✅ gh CLI 触发成功"
            echo "gh_ok=true" >> $GITHUB_OUTPUT
          else
            echo "❌ gh CLI 触发失败"
            echo "gh_ok=false" >> $GITHUB_OUTPUT
          fi

      # 🆘 通道2: curl API 直调
      - name: 🆘 触发晚间补推 (curl API兜底)
        if: steps.check.outputs.trigger_evening == 'true' && steps.trigger_evening_gh.outputs.gh_ok != 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "🆘 gh CLI 失败，使用 curl API 直调..."
          REPO="${{ github.repository }}"
          HTTP=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${PAT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/workflows/daily-evening.yml/dispatches" \
            -d '{"ref":"main","inputs":{"force":"true"}}')
          if [ "$HTTP" = "204" ]; then
            echo "✅ curl API 触发成功 (HTTP ${HTTP})"
          else
            echo "❌ curl API 也失败了 (HTTP ${HTTP})"
          fi
