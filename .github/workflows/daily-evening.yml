name: 婴儿安全日报 · 晚间更新

on:
  schedule:
    # 北京时间 18:30 = UTC 10:30
    - cron: '30 10 * * *'
  workflow_dispatch:  # 支持手动触发
  push:
    paths:
      - 'cloud_push/**'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  push-evening:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 15分钟硬超时
    steps:
      - name: 📥 Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 安装依赖
        run: |
          pip install -r cloud_push/requirements.txt

      - name: 📰 采集晚间增量新闻 & 生成报告
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_USER_OPEN_ID: ${{ secrets.FEISHU_USER_OPEN_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONUNBUFFERED: 1
        run: |
          cd cloud_push
          timeout 180 python3 main.py --mode evening 2>&1
          echo "main.py exit=$?"

      - name: 📤 提交 HTML 报告到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 自动更新晚间日报 HTML $(date +%Y-%m-%d) [skip ci]"
            git push origin main
          fi

      - name: 🔔 失败通知
        if: failure()
        run: |
          echo "❌ 晚间推送失败，请检查日志"
          # 可接入 Slack/飞书 webhook 发送失败通知
