name: 婴儿安全日报 · 早间版

on:
  schedule:
    # 北京时间 09:30 = UTC 01:30
    - cron: '30 1 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write  # 需要写权限来提交生成的 HTML

jobs:
  push-morning:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 15分钟硬超时，防止网络问题永久挂起
    steps:
      - name: 📥 Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全量 clone 以便 commit

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 安装依赖
        run: |
          pip install -r cloud_push/requirements.txt

      - name: 📰 采集新闻 & 生成报告
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_USER_OPEN_ID: ${{ secrets.FEISHU_USER_OPEN_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONUNBUFFERED: 1
        run: |
          echo "=== TRACE: cd cloud_push ==="
          cd cloud_push
          echo "=== TRACE: import test ==="
          python3 -c "from news_fetcher import fetch_news; print('import OK')"
          python3 -c "from feishu_sender import send_daily_report; print('feishu import OK')"
          echo "=== TRACE: main.py ==="
          python3 -u main.py --mode morning
          echo "=== TRACE: main.py exit=$? ==="

      - name: 📤 提交 HTML 报告到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ || true
          git diff --staged --quiet || (git commit -m "📊 自动更新日报 HTML $(date +%Y-%m-%d)" && git push)

      - name: 📤 发送飞书通知（如果上面的步骤没有发送）
        if: always()
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_USER_OPEN_ID: ${{ secrets.FEISHU_USER_OPEN_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # main.py 已包含发送逻辑，这里只是确保执行
          echo "飞书推送状态请查看上方日志"

      - name: 🔔 失败通知
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
