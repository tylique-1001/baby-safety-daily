name: 婴儿安全日报 · 早间版

on:
  schedule:
    # 北京时间 09:30 = UTC 01:30
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  push-morning:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r cloud_push/requirements.txt

      - name: Run morning pipeline
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_USER_OPEN_ID: ${{ secrets.FEISHU_USER_OPEN_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONUNBUFFERED: 1
        run: |
          cd cloud_push
          timeout 180 python3 main.py --mode morning 2>&1
          echo "main.py exit=$?"

      - name: Commit report
        run: |
          set -x
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ls -la docs/
          git add -f docs/
          git status
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily report $(date +%Y-%m-%d)"
            git push origin main
          fi
