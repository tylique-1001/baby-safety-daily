name: "婴儿安全日报 · 早间版"

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  push-morning:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r cloud_push/requirements.txt
      - name: Fetch news
        run: |
          cd cloud_push
          python3 -u -c '
import sys, time, json
sys.path.insert(0, ".")
t0 = time.time()
from news_fetcher import fetch_news, format_for_report
items = fetch_news(days_back=3, mode="morning")
print(f"fetch: {len(items)} items ({time.time()-t0:.1f}s)")
urgent, important = format_for_report(items)
with open("/tmp/news_data.json", "w") as f:
    json.dump({"urgent": urgent, "important": important}, f)
print(f"data saved: urgent={len(urgent)} important={len(important)}")
'
      - name: Generate report
        run: |
          cd cloud_push
          python3 -u -c '
import sys, json, datetime
sys.path.insert(0, ".")
from main import generate_html_report, get_tips
with open("/tmp/news_data.json") as f:
    data = json.load(f)
today = datetime.date.today()
tips = get_tips(today)
html = generate_html_report(data["urgent"], data["important"], tips, today, "morning")
import os
os.makedirs("../docs", exist_ok=True)
fname = f"../docs/{today.isoformat()}-婴儿安全日报.html"
with open(fname, "w", encoding="utf-8") as f:
    f.write(html)
print(f"report written: {fname} ({len(html)} chars)")
'
      - name: Send Feishu
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_USER_OPEN_ID: ${{ secrets.FEISHU_USER_OPEN_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd cloud_push
          python3 -u -c '
import sys, json, datetime, os
sys.path.insert(0, ".")
from feishu_sender import send_daily_report
with open("/tmp/news_data.json") as f:
    data = json.load(f)
today = datetime.date.today()
repo = os.environ.get("GITHUB_REPOSITORY", "")
cloud_url = f"https://{repo.split(chr(47))[0]}.github.io/{repo.split(chr(47))[1]}/docs/{today.isoformat()}-婴儿安全日报.html" if repo else ""
print(f"cloud_url: {cloud_url}")
ok = send_daily_report(data["urgent"], data["important"], [], cloud_url, today, is_evening=False)
print(f"send: {'OK' if ok else 'FAIL'}")
'
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ || true
          git diff --staged --quiet || (git commit -m "Daily report $(date +%Y-%m-%d)" && git push)
